# services/api/openapi.yaml
openapi: 3.0.1
info:
  title: CRM API
  version: 1.0.0
paths:
  /v1/tenants/{tenant_id}/leads:
    get:
      summary: List leads
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
    post:
      summary: Create lead
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contact_id:
                  type: string
                source:
                  type: string
      responses:
        '201':
          description: created
  /v1/tenants/{tenant_id}/assistant/chat:
    post:
      summary: Assistant chat
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                user_id:
                  type: string
                prompt:
                  type: string
                context_hint:
                  type: object
      responses:
        '200':
          description: OK
